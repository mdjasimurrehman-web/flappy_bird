<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird — with leaderboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #0b0c1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: crisp-edges;
      touch-action: none;
      box-shadow: 0 0 30px rgba(0,200,255,0.2);
    }
    #mobileInput {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      opacity: 0;
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      font-size: 16px;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <input
    type="text"
    id="mobileInput"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  />

  <script>
    (function() {
      const W = 400, H = 600;
      const GRAVITY = 0.28;
      const JUMP_FORCE = -6.5;
      const PIPE_GAP = 200;
      const PIPE_WIDTH = 70;
      const PIPE_SPEED = 3;
      const TARGET_FPS = 60;
      const FRAME_TIME = 1000 / TARGET_FPS;
      const DELETE_PASSWORD = "CPAGLU";

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = W;
      canvas.height = H;

      const mobileInput = document.getElementById('mobileInput');

      // ✅ AUDIO CONTEXT TO UNLOCK ANDROID AUDIO
      let audioUnlocked = false;

      function unlockAudio() {
        if (audioUnlocked) return;
        // ✅ CREATE SILENT AUDIO CONTEXT TO UNLOCK ANDROID
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          const ctx = new AudioContext();
          const buffer = ctx.createBuffer(1, 1, 22050);
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.connect(ctx.destination);
          source.start(0);
          ctx.resume().then(() => {
            audioUnlocked = true;
          });
        }

        // ✅ ALSO TRY PLAYING ALL AUDIO ELEMENTS SILENTLY
        const music = assets['bg_music'];
        if (music && music instanceof HTMLAudioElement) {
          music.volume = 0;
          music.play().then(() => {
            music.pause();
            music.currentTime = 0;
            music.volume = 0.45;
            audioUnlocked = true;
          }).catch(() => {});
        }
      }

      function resizeCanvas() {
        const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
        canvas.style.width = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function openMobileKeyboard() {
        mobileInput.style.opacity = '0';
        mobileInput.style.pointerEvents = 'auto';
        mobileInput.value = '';
        mobileInput.removeAttribute('readonly');
        mobileInput.focus();
        mobileInput.click();
      }

      function closeMobileKeyboard() {
        mobileInput.setAttribute('readonly', true);
        mobileInput.blur();
        mobileInput.style.pointerEvents = 'none';
      }

      mobileInput.addEventListener('input', function() {
        const val = mobileInput.value;
        if (state === 'nameEntry') {
          nameInput = val.replace(/[^a-zA-Z0-9]/g, '').slice(0, 12);
          mobileInput.value = nameInput;
        } else if (state === 'passwordEntry') {
          passwordInput = val.replace(/[^a-zA-Z0-9]/g, '').slice(0, 20);
          mobileInput.value = passwordInput;
        }
      });

      mobileInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (state === 'nameEntry') {
            if (nameInput.trim() !== '') {
              if (editingName) {
                updateName(editingName, nameInput.trim());
                if (playerName === editingName) {
                  playerName = nameInput.trim();
                }
              } else {
                playerName = nameInput.trim();
              }
              state = 'leaderboard';
              isEnteringName = false;
              editingName = null;
              closeMobileKeyboard();
            }
          } else if (state === 'passwordEntry') {
            const enteredPassword = passwordInput.trim();
            if (enteredPassword === DELETE_PASSWORD) {
              if (nameToDelete) {
                deleteNameFromLeaderboard(nameToDelete);
                passwordMessage = 'Name deleted successfully!';
              }
            } else {
              passwordMessage = 'Wrong password!';
            }
            setTimeout(() => {
              state = 'leaderboard';
              passwordInput = '';
              nameToDelete = null;
              passwordMessage = '';
              closeMobileKeyboard();
            }, 1500);
          }
        }
        if (e.key === 'Backspace') {
          e.preventDefault();
          if (state === 'nameEntry') {
            nameInput = nameInput.slice(0, -1);
            mobileInput.value = nameInput;
          } else if (state === 'passwordEntry') {
            passwordInput = passwordInput.slice(0, -1);
            mobileInput.value = passwordInput;
          }
        }
      });

      let leaderboard = [];
      try {
        const saved = localStorage.getItem('flappy_leaderboard');
        if (saved) leaderboard = JSON.parse(saved);
      } catch(e) { console.warn('localStorage not available'); }

      function saveLeaderboard() {
        try {
          localStorage.setItem('flappy_leaderboard', JSON.stringify(leaderboard));
        } catch(e) {}
      }

      function addScore(name, score) {
        const existingIndex = leaderboard.findIndex(entry => entry.name === name);
        if (existingIndex !== -1) {
          if (score > leaderboard[existingIndex].score) {
            leaderboard[existingIndex].score = score;
          }
        } else {
          leaderboard.push({ name, score });
        }
        leaderboard.sort((a, b) => b.score - a.score);
        if (leaderboard.length > 10) leaderboard = leaderboard.slice(0, 10);
        saveLeaderboard();
      }

      function getLeaderboard() {
        return leaderboard;
      }

      function deleteNameFromLeaderboard(name) {
        leaderboard = leaderboard.filter(entry => entry.name !== name);
        saveLeaderboard();
      }

      function updateName(oldName, newName) {
        const index = leaderboard.findIndex(entry => entry.name === oldName);
        if (index !== -1) {
          const score = leaderboard[index].score;
          leaderboard.splice(index, 1);
          leaderboard.push({ name: newName, score });
          leaderboard.sort((a, b) => b.score - a.score);
          if (leaderboard.length > 10) leaderboard = leaderboard.slice(0, 10);
          saveLeaderboard();
        }
      }

      const assets = {};

      function loadImage(key, src) {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => { assets[key] = img; resolve(); };
          img.onerror = () => { assets[key] = null; resolve(); };
          img.src = src;
        });
      }

      function loadSound(key, src) {
        return new Promise(resolve => {
          const audio = new Audio();
          audio.oncanplaythrough = () => { assets[key] = audio; resolve(); };
          audio.onerror = () => { assets[key] = null; resolve(); };
          audio.src = src;
          audio.load();
          setTimeout(resolve, 1500);
        });
      }

      async function loadAllAssets() {
        await Promise.all([
          loadImage('bird',         'assets/BIRD.jpg'),
          loadImage('bg_game',      'assets/background.jpg'),
          loadImage('bg_home',      'assets/home_bg.jpg'),
          loadImage('bg_pause',     'assets/pause_bg.jpg'),
          loadImage('bg_gameover',  'assets/gameover_bg.jpg'),
          loadImage('pipe_top1',    'assets/pipe_top1.jpg'),
          loadImage('pipe_bottom1', 'assets/pipe_bottom1.jpg'),
          loadImage('pipe_top2',    'assets/pipe_top2.jpg'),
          loadImage('pipe_bottom2', 'assets/pipe_bottom2.jpg'),
          loadSound('bg_music',     'assets/sounds/bg_music.MP3'),
          loadSound('die_sound',    'assets/sounds/die.wav.MP3')
        ]);
      }

      function drawImg(key, x, y, w, h) {
        const img = assets[key];
        if (img && img instanceof HTMLImageElement && img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, x, y, w, h);
        } else {
          const fallback = {
            bird: '#f3e35c',
            bg_game: '#1e2b3a',
            bg_home: '#193441',
            bg_pause: '#2c3a4b',
            bg_gameover: '#4a1f2b',
            pipe_top1: '#3e8e41',
            pipe_bottom1: '#3e8e41',
            pipe_top2: '#d45d1e',
            pipe_bottom2: '#d45d1e',
          };
          ctx.fillStyle = fallback[key] || '#6b7b8b';
          ctx.fillRect(x, y, w, h);
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.font = '10px "Courier New", monospace';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.fillText(key.slice(0,8), x+4, y+4);
        }
      }

      // ✅ FIXED PLAY MUSIC - RETRIES ON ANDROID
      function playMusic() {
        const music = assets['bg_music'];
        if (music && music instanceof HTMLAudioElement) {
          music.loop = true;
          music.volume = 0.45;
          music.currentTime = 0;
          const playPromise = music.play();
          if (playPromise !== undefined) {
            playPromise.catch(() => {
              // ✅ RETRY AFTER SHORT DELAY FOR ANDROID
              setTimeout(() => {
                music.play().catch(() => {});
              }, 300);
            });
          }
        }
      }

      function stopMusic() {
        const music = assets['bg_music'];
        if (music && music instanceof HTMLAudioElement) {
          music.pause();
          music.currentTime = 0;
        }
      }

      function pauseMusic() {
        const music = assets['bg_music'];
        if (music && music instanceof HTMLAudioElement) {
          music.pause();
        }
      }

      function resumeMusic() {
        const music = assets['bg_music'];
        if (music && music instanceof HTMLAudioElement) {
          music.play().catch(() => {});
        }
      }

      function playDie() {
        const sfx = assets['die_sound'];
        if (sfx && sfx instanceof HTMLAudioElement) {
          sfx.currentTime = 0;
          sfx.play().catch(() => {});
        }
      }

      function stopDie() {
        const sfx = assets['die_sound'];
        if (sfx && sfx instanceof HTMLAudioElement) {
          sfx.pause();
          sfx.currentTime = 0;
        }
      }

      class MinimalButton {
        constructor(x, y, w, h, text, textColor = [255, 255, 255], fontSize = 14) {
          this.x = x; this.y = y; this.w = w; this.h = h;
          this.text = text;
          this.textColor = textColor;
          this.fontSize = fontSize;
        }
        draw() {
          ctx.shadowColor = 'rgba(0,0,0,0.7)';
          ctx.shadowBlur = 6;
          ctx.shadowOffsetX = 1;
          ctx.shadowOffsetY = 1;
          ctx.fillStyle = `rgb(${this.textColor[0]},${this.textColor[1]},${this.textColor[2]})`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = `bold ${this.fontSize}px "Arial", sans-serif`;
          ctx.fillText(this.text, this.x + this.w/2, this.y + this.h/2);
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;
        }
        contains(px, py) {
          return px >= this.x && px <= this.x + this.w && py >= this.y && py <= this.y + this.h;
        }
      }

      class Bird {
        constructor() {
          this.x = 80;
          this.y = H / 2;
          this.vy = 0;
          this.w = 38;
          this.h = 38;
        }
        update() {
          this.vy += GRAVITY;
          this.y += this.vy;
        }
        jump() {
          this.vy = JUMP_FORCE;
        }
        draw() {
          const tilt = Math.min(Math.max(this.vy * 0.05, -0.5), 0.7);
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(tilt);
          drawImg('bird', -this.w/2, -this.h/2, this.w, this.h);
          ctx.restore();
        }
      }

      class Pipe {
        constructor() {
          this.x = W;
          const minTop = 40;
          const maxTop = H - PIPE_GAP - 40;
          this.topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
          this.bottomHeight = H - this.topHeight - PIPE_GAP;
          this.passed = false;
          this.set = Math.random() < 0.5 ? '1' : '2';
        }
        update() {
          this.x -= PIPE_SPEED;
        }
        draw() {
          drawImg(`pipe_top${this.set}`, this.x, 0, PIPE_WIDTH, this.topHeight);
          drawImg(`pipe_bottom${this.set}`, this.x, this.topHeight + PIPE_GAP, PIPE_WIDTH, this.bottomHeight);
        }
        collide(bird) {
          const birdLeft = bird.x - bird.w/2;
          const birdRight = bird.x + bird.w/2;
          const birdTop = bird.y - bird.h/2;
          const birdBottom = bird.y + bird.h/2;
          if (birdRight > this.x && birdLeft < this.x + PIPE_WIDTH) {
            if (birdTop < this.topHeight || birdBottom > this.topHeight + PIPE_GAP) {
              return true;
            }
          }
          return false;
        }
      }

      let state = 'home';
      let bird, pipes, score;
      let pauseBtn, homeBtn, resumeBtn, restartBtn, homeFromGameoverBtn, leaderboardBtn, viewLeaderboardBtn, backFromLeaderboardBtn, saveNameBtn, addNameBtn, submitPasswordBtn;

      let countdownValue = 5;
      let countdownInterval = null;

      let isEnteringName = false;
      let playerName = '';
      let nameInput = '';
      let editingName = null;
      let pendingScore = 0;

      let passwordInput = '';
      let nameToDelete = null;
      let rankClickCount = 0;
      let rankClickTimer = null;
      let selectedRank = null;
      let passwordMessage = '';

      function initGame() {
        bird = new Bird();
        pipes = [new Pipe()];
        score = 0;
        pauseBtn = new MinimalButton(12, 12, 58, 28, 'PAUSE', [255, 255, 255], 14);
        homeBtn  = new MinimalButton(78, 12, 50, 28, 'HOME', [255, 255, 255], 14);
        leaderboardBtn = new MinimalButton(150, 50, 100, 30, 'LEADERBOARD', [255, 255, 255], 16);
        resumeBtn = new MinimalButton(W/2-80, H/2 - 50, 160, 45, 'CONTINUE', [255, 255, 255], 20);
        restartBtn = new MinimalButton(W/2-80, H/2, 160, 45, 'RESTART', [255, 255, 255], 20);
        homeFromGameoverBtn = new MinimalButton(W/2-80, H/2 + 60, 160, 40, 'HOME', [255, 255, 255], 20);
        viewLeaderboardBtn = new MinimalButton(W/2-80, H/2 + 120, 160, 40, 'VIEW LEADERBOARD', [255, 255, 255], 16);
        backFromLeaderboardBtn = new MinimalButton(W/2-60, 550, 120, 35, 'BACK', [255, 255, 255], 18);
        saveNameBtn = new MinimalButton(W/2-50, H/2 + 100, 100, 35, 'SAVE', [255, 255, 255], 18);
        addNameBtn = new MinimalButton(W/2-60, 490, 120, 40, 'ADD NAME', [255, 255, 0], 18);
        submitPasswordBtn = new MinimalButton(W/2-50, 400, 100, 35, 'SUBMIT', [255, 255, 255], 16);
      }

      function startCountdown() {
        state = 'countdown';
        countdownValue = 5;
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
          countdownValue--;
          if (countdownValue <= 0) {
            clearInterval(countdownInterval);
            countdownInterval = null;
            state = 'playing';
            resumeMusic();
          }
        }, 1000);
      }

      function goHome() {
        stopDie();
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
        stopMusic();
        initGame();
        state = 'home';
        closeMobileKeyboard();
      }

      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        if (e.touches && e.touches.length > 0) {
          return {
            x: (e.touches[0].clientX - rect.left) * scaleX,
            y: (e.touches[0].clientY - rect.top) * scaleY
          };
        }
        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY
        };
      }

      function handleTap(e) {
        e.preventDefault();
        const { x, y } = getPos(e);

        // ✅ UNLOCK AUDIO ON FIRST TAP
        unlockAudio();

        if (state === 'home') {
          if (leaderboardBtn && leaderboardBtn.contains(x, y)) {
            state = 'leaderboard';
            stopDie();
            return;
          }
          // ✅ PLAY MUSIC DIRECTLY ON TAP
          state = 'playing';
          playMusic();
          return;
        }

        if (state === 'nameEntry') {
          if (saveNameBtn && saveNameBtn.contains(x, y)) {
            if (nameInput.trim() !== '') {
              if (editingName) {
                updateName(editingName, nameInput.trim());
                if (playerName === editingName) {
                  playerName = nameInput.trim();
                }
              } else {
                playerName = nameInput.trim();
              }
              state = 'leaderboard';
              isEnteringName = false;
              editingName = null;
              closeMobileKeyboard();
            }
            return;
          }
          openMobileKeyboard();
          return;
        }

        if (state === 'passwordEntry') {
          if (submitPasswordBtn && submitPasswordBtn.contains(x, y)) {
            const enteredPassword = passwordInput.trim();
            if (enteredPassword === DELETE_PASSWORD) {
              if (nameToDelete) {
                deleteNameFromLeaderboard(nameToDelete);
                passwordMessage = 'Name deleted successfully!';
              }
            } else {
              passwordMessage = 'Wrong password!';
            }
            setTimeout(() => {
              state = 'leaderboard';
              passwordInput = '';
              nameToDelete = null;
              passwordMessage = '';
              closeMobileKeyboard();
            }, 1500);
            return;
          }
          openMobileKeyboard();
          return;
        }

        if (state === 'leaderboard') {
          if (backFromLeaderboardBtn && backFromLeaderboardBtn.contains(x, y)) {
            if (prevState === 'gameover') {
              state = 'gameover';
            } else {
              state = 'home';
            }
            return;
          }
          if (addNameBtn && addNameBtn.contains(x, y)) {
            state = 'nameEntry';
            isEnteringName = true;
            nameInput = '';
            editingName = null;
            openMobileKeyboard();
            return;
          }
          if (y >= 140 && y <= 460) {
            const rowIndex = Math.floor((y - 140) / 36);
            if (rowIndex >= 0 && rowIndex < leaderboard.length && rowIndex < 8) {
              const entry = leaderboard[rowIndex];
              const rowY = 150 + (rowIndex * 35);
              if (y >= rowY - 15 && y <= rowY + 20) {
                if (x >= 70 && x <= 280) {
                  nameInput = entry.name;
                  editingName = entry.name;
                  state = 'nameEntry';
                  isEnteringName = true;
                  openMobileKeyboard();
                  return;
                }
                if (x >= 30 && x < 70) {
                  if (selectedRank === rowIndex) {
                    rankClickCount++;
                  } else {
                    selectedRank = rowIndex;
                    rankClickCount = 1;
                  }
                  if (rankClickTimer) clearTimeout(rankClickTimer);
                  rankClickTimer = setTimeout(() => {
                    rankClickCount = 0;
                    selectedRank = null;
                  }, 3000);
                  if (rankClickCount >= 15) {
                    nameToDelete = entry.name;
                    state = 'passwordEntry';
                    passwordInput = '';
                    passwordMessage = '';
                    rankClickCount = 0;
                    selectedRank = null;
                    openMobileKeyboard();
                    if (rankClickTimer) {
                      clearTimeout(rankClickTimer);
                      rankClickTimer = null;
                    }
                  }
                  return;
                }
              }
            }
          }
          return;
        }

        if (state === 'playing') {
          if (pauseBtn.contains(x, y)) {
            state = 'paused';
            pauseMusic();
            return;
          }
          if (homeBtn.contains(x, y)) {
            goHome();
            return;
          }
          bird.jump();
          return;
        }

        if (state === 'paused') {
          if (resumeBtn.contains(x, y)) {
            startCountdown();
            return;
          }
          if (window.pauseHomeBtn && window.pauseHomeBtn.contains(x, y)) {
            goHome();
            return;
          }
          return;
        }

        if (state === 'countdown') { return; }

        if (state === 'gameover') {
          if (restartBtn.contains(x, y)) {
            stopDie();
            stopMusic();
            initGame();
            state = 'playing';
            playMusic();
            return;
          }
          if (homeFromGameoverBtn.contains(x, y)) {
            stopDie();
            goHome();
            return;
          }
          if (viewLeaderboardBtn.contains(x, y)) {
            stopDie();
            prevState = 'gameover';
            state = 'leaderboard';
            return;
          }
          return;
        }
      }

      let prevState = 'home';

      document.addEventListener('keydown', e => {
        const key = e.key;
        if (state === 'nameEntry') {
          if (key === 'Enter') {
            if (nameInput.trim() !== '') {
              if (editingName) {
                updateName(editingName, nameInput.trim());
                if (playerName === editingName) {
                  playerName = nameInput.trim();
                }
              } else {
                playerName = nameInput.trim();
              }
              state = 'leaderboard';
              isEnteringName = false;
              editingName = null;
              closeMobileKeyboard();
            }
            return;
          } else if (key === 'Backspace') {
            nameInput = nameInput.slice(0, -1);
          } else if (key.length === 1 && /[a-zA-Z0-9]/.test(key)) {
            nameInput += key;
          }
          return;
        }
        if (state === 'passwordEntry') {
          if (key === 'Enter') {
            const enteredPassword = passwordInput.trim();
            if (enteredPassword === DELETE_PASSWORD) {
              if (nameToDelete) {
                deleteNameFromLeaderboard(nameToDelete);
                passwordMessage = 'Name deleted successfully!';
              }
            } else {
              passwordMessage = 'Wrong password!';
            }
            setTimeout(() => {
              state = 'leaderboard';
              passwordInput = '';
              nameToDelete = null;
              passwordMessage = '';
              closeMobileKeyboard();
            }, 1500);
            return;
          } else if (key === 'Backspace') {
            passwordInput = passwordInput.slice(0, -1);
          } else if (key.length === 1 && /[a-zA-Z0-9]/.test(key)) {
            passwordInput += key;
          }
          return;
        }
        if (e.code === 'Space' || e.code === 'ArrowUp') {
          e.preventDefault();
          if (state === 'home') {
            state = 'playing';
            playMusic();
          } else if (state === 'playing') {
            bird.jump();
          } else if (state === 'paused') {
            startCountdown();
          } else if (state === 'leaderboard') {
            if (prevState === 'gameover') {
              state = 'gameover';
            } else {
              state = 'home';
            }
          }
        }
      });

      canvas.addEventListener('touchstart', handleTap, { passive: false });
      canvas.addEventListener('mousedown', handleTap);

      function drawHome() {
        drawImg('bg_home', 0, 0, W, H);
        ctx.font = 'bold 48px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillText('FLAPPY BIRD', W/2, 140);
        ctx.font = 'bold 32px "Arial", sans-serif';
        ctx.fillText('Tap to Start', W/2 - 40, 310);
        if (leaderboardBtn) leaderboardBtn.draw();
        ctx.shadowColor = 'transparent';
      }

      function drawNameEntry() {
        drawImg('bg_home', 0, 0, W, H);
        ctx.font = 'bold 36px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        if (editingName) {
          ctx.fillText('EDIT NAME', W/2, 150);
        } else {
          ctx.fillText('ADD NAME', W/2, 150);
        }
        ctx.font = 'bold 20px "Arial", sans-serif';
        ctx.fillStyle = '#aaa';
        if (editingName) {
          ctx.fillText(`Editing: ${editingName}`, W/2, 210);
        } else {
          ctx.fillText('Enter your name:', W/2, 210);
        }
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(W/2-100, 260, 200, 40);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(W/2-100, 260, 200, 40);
        ctx.font = 'bold 24px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText(nameInput + (Date.now() % 1000 < 500 ? '_' : ''), W/2, 285);
        ctx.font = 'bold 16px "Arial", sans-serif';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('Tap screen to type', W/2, 330);
        ctx.fillText('Press SAVE when done', W/2, 355);
        if (saveNameBtn) {
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.beginPath();
          ctx.roundRect(saveNameBtn.x, saveNameBtn.y, saveNameBtn.w, saveNameBtn.h, 8);
          ctx.fill();
          saveNameBtn.draw();
        }
        ctx.shadowColor = 'transparent';
      }

      function drawPasswordEntry() {
        drawImg('bg_home', 0, 0, W, H);
        ctx.font = 'bold 36px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText('ENTER PASSWORD', W/2, 150);
        ctx.font = 'bold 20px "Arial", sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText(`Delete: ${nameToDelete || ''}`, W/2, 210);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(W/2-100, 260, 200, 40);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(W/2-100, 260, 200, 40);
        const hiddenPassword = '*'.repeat(passwordInput.length);
        ctx.font = 'bold 24px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText(hiddenPassword + (Date.now() % 1000 < 500 ? '_' : ''), W/2, 285);
        ctx.font = 'bold 16px "Arial", sans-serif';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('Tap screen to type', W/2, 330);
        if (passwordMessage) {
          ctx.fillStyle = passwordMessage.includes('Wrong') ? '#ff6b6b' : '#6bff6b';
          ctx.fillText(passwordMessage, W/2, 355);
        }
        if (submitPasswordBtn) {
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.beginPath();
          ctx.roundRect(submitPasswordBtn.x, submitPasswordBtn.y, submitPasswordBtn.w, submitPasswordBtn.h, 8);
          ctx.fill();
          submitPasswordBtn.draw();
        }
        ctx.shadowColor = 'transparent';
      }

      function drawLeaderboard() {
        drawImg('bg_home', 0, 0, W, H);
        ctx.font = 'bold 36px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText('LEADERBOARD', W/2, 80);
        ctx.font = 'bold 14px "Arial", sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Click name to edit', W/2, 110);
        ctx.fillText('Click rank 15x to delete', W/2, 130);
        ctx.font = 'bold 20px "Arial", sans-serif';
        ctx.textAlign = 'left';
        let y = 150;
        const leaderboardData = getLeaderboard();
        if (leaderboardData.length === 0) {
          ctx.fillStyle = '#aaa';
          ctx.textAlign = 'center';
          ctx.fillText('No scores yet', W/2, 250);
          ctx.textAlign = 'left';
        } else {
          leaderboardData.slice(0, 8).forEach((entry, i) => {
            if (i === 0) ctx.fillStyle = '#ffd700';
            else if (i === 1) ctx.fillStyle = '#c0c0c0';
            else if (i === 2) ctx.fillStyle = '#cd7f32';
            else ctx.fillStyle = '#fff';
            if (selectedRank === i && rankClickCount > 0) ctx.fillStyle = '#ff6b6b';
            ctx.fillText(`${i+1}.`, 45, y);
            ctx.fillStyle = entry.name === playerName ? '#ffd700' : '#fff';
            ctx.fillText(entry.name, 80, y);
            ctx.textAlign = 'right';
            ctx.fillStyle = i === 0 ? '#ffd700' : (i === 1 ? '#c0c0c0' : (i === 2 ? '#cd7f32' : '#fff'));
            ctx.fillText(`${entry.score}`, 320, y);
            ctx.textAlign = 'left';
            if (selectedRank === i && rankClickCount > 0) {
              ctx.font = 'bold 12px "Arial", sans-serif';
              ctx.fillStyle = '#ff6b6b';
              ctx.fillText(`${15 - rankClickCount}`, 25, y-5);
            }
            y += 35;
          });
        }
        ctx.textAlign = 'center';
        if (addNameBtn) {
          ctx.fillStyle = 'rgba(255,255,0,0.15)';
          ctx.beginPath();
          ctx.roundRect(addNameBtn.x, addNameBtn.y, addNameBtn.w, addNameBtn.h, 8);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,0,0.5)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(addNameBtn.x, addNameBtn.y, addNameBtn.w, addNameBtn.h, 8);
          ctx.stroke();
          addNameBtn.draw();
        }
        if (backFromLeaderboardBtn) {
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          ctx.beginPath();
          ctx.roundRect(backFromLeaderboardBtn.x, backFromLeaderboardBtn.y, backFromLeaderboardBtn.w, backFromLeaderboardBtn.h, 8);
          ctx.fill();
          backFromLeaderboardBtn.draw();
        }
        ctx.shadowColor = 'transparent';
      }

      function drawPause() {
        drawImg('bg_pause', 0, 0, W, H);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.roundRect(resumeBtn.x, resumeBtn.y, resumeBtn.w, resumeBtn.h, 10);
        ctx.fill();
        resumeBtn.draw();
        const pauseHome = new MinimalButton(W/2-50, H/2 + 20, 100, 35, 'HOME', [255, 255, 255], 18);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.roundRect(pauseHome.x, pauseHome.y, pauseHome.w, pauseHome.h, 8);
        ctx.fill();
        pauseHome.draw();
        window.pauseHomeBtn = pauseHome;
        ctx.font = 'bold 32px "Arial", sans-serif';
        ctx.fillStyle = 'white';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillText('PAUSED', W/2, 160);
        ctx.shadowColor = 'transparent';
      }

      function drawCountdown() {
        ctx.globalAlpha = 0.4;
        drawGame();
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, 0, W, H);
        ctx.font = 'bold 140px "Arial", sans-serif';
        ctx.fillStyle = 'white';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetX = 6;
        ctx.shadowOffsetY = 6;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(countdownValue.toString(), W/2, H/2 - 30);
        ctx.font = 'bold 30px "Arial", sans-serif';
        ctx.fillText('GET READY!', W/2, H/2 + 60);
        ctx.shadowColor = 'transparent';
      }

      function drawGameOver() {
        drawImg('bg_gameover', 0, 0, W, H);
        ctx.font = 'bold 40px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillText('GAME OVER', W/2, H/2 - 80);
        ctx.font = 'bold 32px "Arial", sans-serif';
        ctx.fillText('Score: ' + score, W/2, H/2 - 20);
        ctx.shadowColor = 'transparent';
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.roundRect(restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h, 8);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(homeFromGameoverBtn.x, homeFromGameoverBtn.y, homeFromGameoverBtn.w, homeFromGameoverBtn.h, 8);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(viewLeaderboardBtn.x, viewLeaderboardBtn.y, viewLeaderboardBtn.w, viewLeaderboardBtn.h, 8);
        ctx.fill();
        restartBtn.draw();
        homeFromGameoverBtn.draw();
        viewLeaderboardBtn.draw();
      }

      function drawGame() {
        drawImg('bg_game', 0, 0, W, H);
        pipes.forEach(p => p.draw());
        bird.draw();
        pauseBtn.draw();
        homeBtn.draw();
        ctx.font = 'bold 36px "Arial", sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillText(String(score), W/2, 20);
        ctx.shadowColor = 'transparent';
      }

      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
        return this;
      };

      let lastTime = 0;

      function loop(ts) {
        requestAnimationFrame(loop);
        if (ts - lastTime < FRAME_TIME) return;
        lastTime = ts;
        ctx.clearRect(0, 0, W, H);
        if (state === 'home') { drawHome(); return; }
        if (state === 'nameEntry') { drawNameEntry(); return; }
        if (state === 'passwordEntry') { drawPasswordEntry(); return; }
        if (state === 'leaderboard') { drawLeaderboard(); return; }
        if (state === 'paused') { drawPause(); return; }
        if (state === 'countdown') { drawCountdown(); return; }
        if (state === 'gameover') { drawGameOver(); return; }
        bird.update();
        if (pipes[pipes.length-1].x < W - 200) pipes.push(new Pipe());
        for (let p of pipes) {
          p.update();
          if (p.collide(bird)) {
            playDie();
            pauseMusic();
            if (playerName) addScore(playerName, score);
            state = 'gameover';
            return;
          }
          if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
            p.passed = true;
            score++;
          }
        }
        pipes = pipes.filter(p => p.x > -PIPE_WIDTH);
        if (bird.y > H || bird.y < 0) {
          playDie();
          pauseMusic();
          if (playerName) addScore(playerName, score);
          state = 'gameover';
          return;
        }
        drawGame();
      }

      async function start() {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px "Arial", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Loading assets...', W/2, H/2 - 20);
        ctx.font = '16px "Arial", sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Place image & sound files', W/2, H/2 + 20);
        ctx.fillText('or use colour fallbacks', W/2, H/2 + 44);
        await loadAllAssets();
        const required = ['bird','bg_game','bg_home','bg_pause','bg_gameover',
                          'pipe_top1','pipe_bottom1','pipe_top2','pipe_bottom2'];
        const missing = required.filter(k => !assets[k]);
        if (missing.length > 0) console.warn('Missing assets, using fallback colours', missing);
        initGame();
        requestAnimationFrame(loop);
      }

      start();
    })();
  </script>
